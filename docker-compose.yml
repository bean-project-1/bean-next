# =====================================================
# BEAN — docker-compose for local development
# =====================================================

services:
  # ---- PostgreSQL Database ----
  postgres:
    image: postgres:16-alpine
    container_name: bean_postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: bean_user
      POSTGRES_PASSWORD: bean_password
      POSTGRES_DB: bean_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bean_user -d bean_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Web App (Next.js) ----
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder  # Use builder stage in dev for hot reload
    container_name: bean_web
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://bean_user:bean_password@postgres:5432/bean_db
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/web:/app/apps/web
      - /app/apps/web/node_modules
      - /app/apps/web/.next

  # ---- AI Engine (Python FastAPI — future) ----
